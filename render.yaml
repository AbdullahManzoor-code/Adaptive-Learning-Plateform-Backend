# Render manifest for Adaptive-Learning-Plateform-Backend.
# Web app + Postgres + Key Value, wired together through internal URLs.

previews:
  generation: off

envVarGroups:
  - name: adaptive-learning-common
    envVars:
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: ENVIRONMENT
        value: production
      - key: ADMIN_EMAILS
        value: admin@example.com,superadmin@example.com

services:
  - type: web
    name: adaptive-learning-backend
    runtime: docker
    repo: https://github.com/FahadAliOfficial/Adaptive-Learning-Plateform-Backend
    branch: main
    plan: free
    autoDeployTrigger: commit
    dockerfilePath: Dockerfile
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - fromGroup: adaptive-learning-common
      - key: DATABASE_URL
        fromDatabase:
          name: adaptive-learning-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: adaptive-learning-redis
          type: keyvalue
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DISABLE_RL_MODELS
        value: "false"

  - type: keyvalue
    name: adaptive-learning-redis
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: adaptive-learning-db
    plan: free
    region: oregon
    databaseName: adaptive_learning_db
    user: adaptive_learning_user
    postgresMajorVersion: "13"
