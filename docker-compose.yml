version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fyp_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-fyp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fyp_password}
      POSTGRES_DB: ${DB_NAME:-fyp_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fyp_user} -d ${DB_NAME:-fyp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fyp_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fyp_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - fyp_network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fyp_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-fyp_user}:${DB_PASSWORD:-fyp_password}@postgres:5432/${DB_NAME:-fyp_db}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - fyp_network
    develop:
      watch:
        - action: sync
          path: ./routers
          target: /app/routers
        - action: sync
          path: ./services
          target: /app/services
        - action: sync
          path: ./models
          target: /app/models
        - action: rebuild
          path: requirements.txt
          target: /app/requirements.txt

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  fyp_network:
    driver: bridge
